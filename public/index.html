<html>


<head>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

    <audio id="notifSound" src="holy-moly-emoji.mp3" preload="auto"></audio>

<h1>Clicks: <span id="count"></span></h1>
<button onclick="sendClickP()">Add one</button>
<button onclick="sendClickN()">Remove one</button>

  <div class="flex-container">
	 <div class ="input-box">
	<div class ="mensajes" id="chatBox">
  <ul id="messages"></ul>
	</div>

  <div class="button-box">
  <input id="iInput" type="text" placeholder="Enter your full name" /> 
  <button id="nigger" onclick="sendMessage()">Send</button>
  <button id="expandBtn" onclick="toggleChat()">Expand</button>	
  <button id="holy-noly" onclick="holymoly()">Holy Moly</button>

   </div>
</div>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>

const sound = document.getElementById("notifSound");


document.addEventListener("click", () => {
  sound.play().then(() => {
    sound.pause();
    sound.currentTime = 0;
  }).catch(() => {});
}, { once: true });

let socket = io();
let count = 0;
const username = prompt("Enter your name");

 const input = document.getElementById("iInput");
input.addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    document.getElementById("nigger").click();
  }
}); 

function sendClickP() {
    socket.emit("clickp");
    count++;
}


function sendClickN() {
    socket.emit("clickn");
    count--;
}

function sendMessage() {
 const chatBox = document.getElementById("chatBox");
 if (input.value.trim() === "") return;
 socket.emit("chat message", {
  user: username,
  text: input.value

});

 input.value = "";
 requestAnimationFrame(() => {
 requestAnimationFrame(() => {
  chatBox.scrollTop = chatBox.scrollHeight;
 });
 });
}

function toggleChat() {
  const chatBox = document.getElementById("chatBox");
  const button = document.getElementById("expandBtn");

  chatBox.classList.toggle("expanded");

  if (chatBox.classList.contains("expanded")) {
    button.textContent = "Collapse";
  } else {
    button.textContent = "Expand";
  }
}

function holymoly() {
sound.currentTime = 0;
sound.play().catch(() => {});
}


socket.on("chat message", (data) => {
 const li = document.createElement("li");
 li.textContent = data.user + ": " + data.text;
 document.getElementById("messages").appendChild(li);




sound.currentTime = 0;
sound.play().catch(() => {});


});

socket.on("update", (newCount) => {
    document.getElementById("count").innerText = newCount;
});




</script>
</body>
</html>
